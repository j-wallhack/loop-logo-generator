<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loop GIF Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <main class="page">
      <div class="layout">
        <div class="left">
          <header>
            <h1>Loop GIF Generator</h1>
            <p>Create a looping GIF from a single image with directional motion.</p>
          </header>

          <section class="panel">
            <form id="controls">
              <div class="field">
                <label for="image">Image</label>
                <input type="file" id="image" name="image" accept="image/*" required />
              </div>

              <div class="field">
                <label for="bgcolor">Background</label>
                <div style="display: flex; align-items: center; gap: 8px;">
                  <input type="color" id="bgcolor" name="bgcolor" value="#111827" />
                  <label style="display: flex; align-items: center; gap: 4px; font-weight: normal; cursor: pointer;">
                    <input type="checkbox" id="transparent-bg" />
                    <span>Transparent</span>
                  </label>
                </div>
              </div>

              <div class="field">
                <label for="animation_type">Animation Type</label>
                <select id="animation_type" name="animation_type">
                  <optgroup label="2D Movements">
                    <option value="left">Left</option>
                    <option value="right">Right</option>
                    <option value="up">Up</option>
                    <option value="down">Down</option>
                    <option value="diagonal-right">Diagonal Right</option>
                    <option value="diagonal-left">Diagonal Left</option>
                  </optgroup>
                  <optgroup label="3D Effects">
                    <option value="cube">3D Cube</option>
                    <option value="cylinder">3D Cylinder</option>
                    <option value="spin">3D Spin (Horizontal)</option>
                    <option value="flip">3D Flip (Vertical)</option>
                  </optgroup>
                  <optgroup label="Rotation & Spin">
                    <option value="rotate">Rotate (Pure Spin)</option>
                    <option value="spiral">Spiral (Rotate + Zoom)</option>
                    <option value="swirl">Swirl</option>
                    <option value="twist">Twist</option>
                    <option value="pendulum">Pendulum</option>
                  </optgroup>
                  <optgroup label="Scale & Transform">
                    <option value="zoom">Zoom Loop</option>
                    <option value="pulse">Pulse</option>
                    <option value="bounce">Bounce</option>
                    <option value="elastic">Elastic Bounce</option>
                    <option value="slide-scale">Slide + Scale</option>
                  </optgroup>
                  <optgroup label="Distortion Effects">
                    <option value="wave">Wave</option>
                    <option value="shake">Shake</option>
                    <option value="glitch">Glitch</option>
                  </optgroup>
                  <optgroup label="Fade Effects">
                    <option value="fade">Fade In/Out</option>
                  </optgroup>
                </select>
              </div>

              <div class="field">
                <label for="frames">Frames</label>
                <input
                  type="number"
                  id="frames"
                  name="frames"
                  value="30"
                  min="2"
                  max="240"
                />
                <p class="hint">More frames = smoother motion (also larger GIF).</p>
              </div>

              <div class="field">
                <label for="frame_duration">Frame duration (ms)</label>
                <input
                  type="number"
                  id="frame_duration"
                  name="frame_duration"
                  value="60"
                  min="10"
                  max="5000"
                />
                <p class="hint">Time each frame is shown. Lower is faster.</p>
              </div>

              <p id="status" class="status"></p>
            </form>
          </section>
        </div>

        <div class="right">
          <section class="panel">
            <h2>Generated GIF</h2>
            <div class="output">
              <img id="gif-output" alt="Generated GIF will appear here" />
              <a id="download-link" href="#" download="loop.gif">Download GIF</a>
            </div>
          </section>
        </div>
      </div>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
